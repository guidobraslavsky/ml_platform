<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Soporte postventa</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        textarea,
        select {

            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 6px;

            font-size: 16px;

        }

        button {

            width: 100%;
            padding: 15px;

            background: #3483fa;
            color: white;

            border: none;
            border-radius: 6px;

            font-size: 18px;

            cursor: pointer;

        }

        button:hover {
            background: #2968c8;
        }

        .preview img {
            max-width: 100%;
            max-height: 120px;
            margin-top: 10px;
            border-radius: 6px;
        }

        .productoInfo {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .productoInfo img {
            max-width: 120px;
            border-radius: 6px;
        }

        .success {

            display: none;
            text-align: center;
            color: green;
            font-weight: bold;
            margin-top: 20px;

        }
    </style>

</head>

<body>

    <div class="container">

        <h2>¿Tuviste algún problema con tu producto?</h2>

        <form id="reclamoForm" enctype="multipart/form-data">

            <input name="nombre" placeholder="Nombre" required>

            <input name="pedido_ml" id="pedido_ml" placeholder="Número de pedido Mercado Libre" required>

            <div id="productoInfo" class="productoInfo">

                <img id="productoFoto">

                <p id="productoTitulo"></p>

            </div>

            <input name="contacto" placeholder="Email o WhatsApp" required>

            <input name="producto" id="producto" placeholder="Producto" readonly>

            <select name="tipo">

                <option>Producto dañado</option>
                <option>Falta pieza</option>
                <option>No funciona</option>
                <option>Otro</option>

            </select>

            <textarea name="descripcion" placeholder="Descripción del problema"></textarea>

            <label>Foto del producto</label>
            <input type="file" name="foto1" id="foto1" accept="image/*">

            <label>Otra foto (opcional)</label>
            <input type="file" name="foto2" id="foto2" accept="image/*">

            <label>Tercera foto (opcional)</label>
            <input type="file" name="foto3" id="foto3" accept="image/*">

            <button type="submit">
                Enviar reclamo
            </button>

        </form>

        <p class="success" id="successMsg">
            Reclamo enviado correctamente. Te responderemos pronto.
        </p>

    </div>

    <script>

        /* ELEMENTOS */

        const pedidoInput = document.getElementById("pedido_ml")
        const productoInput = document.getElementById("producto")

        const productoInfo = document.getElementById("productoInfo")
        const productoFoto = document.getElementById("productoFoto")
        const productoTitulo = document.getElementById("productoTitulo")


        /* AUTOCOMPLETAR PRODUCTO DESDE ML */

        pedidoInput.addEventListener("blur", async () => {

            const order = pedidoInput.value

            if (!order) return

            try {

                const response = await fetch(`/order_info?order=${order}`)

                const data = await response.json()

                if (data.ok) {

                    productoInput.value = data.producto

                    productoInfo.style.display = "block"

                    productoFoto.src = data.foto

                    productoTitulo.innerHTML = `
<b>${data.producto}</b><br>
Cantidad: ${data.cantidad}<br>
Precio: $${data.precio}<br>
Fecha: ${data.fecha}
`

                }

            } catch (e) {

                console.log("Error consultando pedido")

            }

        })


        /* PREVIEW IMAGENES */

        function preview(input) {

            input.addEventListener("change", function () {

                const file = this.files[0]

                if (file) {

                    const img = document.createElement("img")

                    img.src = URL.createObjectURL(file)

                    img.style.maxWidth = "100px"

                    this.parentNode.appendChild(img)

                }

            })

        }

        preview(document.getElementById("foto1"))
        preview(document.getElementById("foto2"))
        preview(document.getElementById("foto3"))


        /* ENVIAR FORMULARIO */

        const form = document.getElementById("reclamoForm")

        form.addEventListener("submit", async (e) => {

            e.preventDefault()

            const formData = new FormData(form)

            await fetch("/complaint", {

                method: "POST",
                body: formData

            })

            form.style.display = "none"

            document.getElementById("successMsg").style.display = "block"

        })

    </script>

</body>

</html>
