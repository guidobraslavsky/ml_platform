<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Soporte postventa</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        textarea,
        select {

            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 6px;

            font-size: 16px;

        }

        button {

            width: 100%;
            padding: 15px;

            background: #3483fa;
            color: white;

            border: none;
            border-radius: 6px;

            font-size: 18px;

            cursor: pointer;

        }

        button:hover {
            background: #2968c8;
        }

        .success {

            display: none;
            text-align: center;
            color: green;
            font-weight: bold;
            margin-top: 20px;

        }

        .preview img {
            max-width: 100px;
            margin-top: 10px;
            border-radius: 6px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>¿Tuviste algún problema con tu producto?</h2>

        <form id="reclamoForm" enctype="multipart/form-data">

            <input name="nombre" placeholder="Nombre" required>

            <input name="pedido_ml" placeholder="Número de pedido Mercado Libre" required>

            <input name="contacto" placeholder="Email o WhatsApp" required>

            <input name="producto" placeholder="Producto" required>

            <select name="tipo">

                <option>Producto dañado</option>
                <option>Falta pieza</option>
                <option>No funciona</option>
                <option>Otro</option>

            </select>

            <textarea name="descripcion" placeholder="Descripción del problema"></textarea>

            <label>Foto del producto</label>
            <input type="file" name="foto1" accept="image/*">

            <label>Otra foto (opcional)</label>
            <input type="file" name="foto2" accept="image/*">

            <label>Tercera foto (opcional)</label>
            <input type="file" name="foto3" accept="image/*">

            <button type="submit">
                Enviar reclamo
            </button>

        </form>

        <p class="success" id="successMsg">
            Reclamo enviado correctamente. Te responderemos pronto.
        </p>

    </div>

    <script>

        /* PREVIEW IMÁGENES */

        function preview(input) {

            input.addEventListener("change", function () {

                const file = this.files[0]

                if (file) {

                    const img = document.createElement("img")

                    img.src = URL.createObjectURL(file)

                    this.parentNode.appendChild(img)

                }

            })

        }

        preview(document.querySelector("input[name='foto1']"))
        preview(document.querySelector("input[name='foto2']"))
        preview(document.querySelector("input[name='foto3']"))


        /* ENVIAR FORMULARIO */

        const form = document.getElementById("reclamoForm")

        form.addEventListener("submit", async (e) => {

            e.preventDefault()

            const formData = new FormData(form)

            await fetch("/complaint", {

                method: "POST",
                body: formData

            })

            form.style.display = "none"

            document.getElementById("successMsg").style.display = "block"

        })

    </script>

</body>

</html>
