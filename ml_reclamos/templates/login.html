<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {

            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);

        }

        input {

            display: block;
            width: 250px;
            padding: 10px;
            margin-bottom: 15px;

        }

        button {

            width: 100%;
            padding: 10px;
            background: #3483fa;
            color: white;
            border: none;

        }
    </style>

</head>

<body>

    <div class="box">

        <h3>Admin Login</h3>

        <form method="POST">

            <input name="user" placeholder="Usuario">

            <input name="password" type="password" placeholder="Password">

            <button>Entrar</button>

        </form>

    </div>

</body>

</html>
